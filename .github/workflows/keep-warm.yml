name: Keep Backend Warm

on:
  schedule:
    # Runs every 14 minutes (Render sleeps after 15)
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Keep Backend Warm
        run: |
          RESPONSE=$(curl --write-out '%{http_code}' --silent --output /dev/null "https://personal-portfoliogram-backend.onrender.com/api/ping")
          if [ "$RESPONSE" -ne 200 ]; then
            echo "Backend returned status $RESPONSE"
            exit 1
          fi
