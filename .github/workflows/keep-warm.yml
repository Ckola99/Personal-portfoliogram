name: Keep Backend Warm

on:
  schedule:
    # Runs every 14 minutes (Render sleeps after 15)
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend
        run: |
          curl -f https://personal-portfoliogram-backend.onrender.com/api/ping
