name: Keep Backend Warm

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping backend
        run: |
          echo "Pinging backend..."
          RESPONSE=$(curl --write-out '%{http_code}' --silent --output /dev/null https://personal-portfoliogram-backend.onrender.com/api/ping)

          echo "Status code: $RESPONSE"

          if [ "$RESPONSE" -ne 200 ]; then
            echo "Backend returned status $RESPONSE"
            exit 1
          fi
